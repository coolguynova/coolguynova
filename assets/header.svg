<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="320">
  <defs>
    <!-- Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&amp;family=IBM+Plex+Mono:wght@300;400;500;700&amp;display=swap');
      
      :root {
        --color-bg: #0A0A0A;
        --color-border: #222222;
        --color-grid: #141414;
        --color-text-primary: #FFFFFF;
        --color-text-secondary: #888888;
        --color-text-muted: #444444;
        --color-glow: rgba(255, 255, 255, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      /* Base styles */
      .font-mono {
        font-family: 'IBM Plex Mono', 'Courier Prime', Courier, monospace;
      }

      /* Animations */
      @keyframes scanline {
        0% { transform: translateY(-320px); }
        100% { transform: translateY(320px); }
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes spin-cw {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes spin-ccw {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.85; }
      }

      @keyframes pulse-dot {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.3); opacity: 0.4; }
      }

      @keyframes code-scroll {
        0% { transform: translateY(0); }
        10% { transform: translateY(0); }
        20% { transform: translateY(-16px); }
        35% { transform: translateY(-16px); }
        45% { transform: translateY(-32px); }
        60% { transform: translateY(-32px); }
        70% { transform: translateY(-48px); }
        85% { transform: translateY(-48px); }
        95% { transform: translateY(-64px); }
        100% { transform: translateY(-64px); }
      }

      @keyframes glitch-glow {
        0%, 100% { text-shadow: 0 0 4px rgba(255, 255, 255, 0.3); }
        50% { text-shadow: 0 0 12px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4); }
      }

      /* Animation Utility Classes */
      .anim-scanline {
        animation: scanline 8s linear infinite;
      }
      
      .anim-blink {
        animation: blink 1s step-end infinite;
      }

      .anim-spin-cw {
        transform-origin: 700px 160px;
        animation: spin-cw 20s linear infinite;
      }

      .anim-spin-ccw {
        transform-origin: 700px 160px;
        animation: spin-ccw 15s linear infinite;
      }

      .anim-pulse {
        animation: pulse 3s ease-in-out infinite;
      }

      .anim-pulse-slow {
        animation: pulse 5s ease-in-out infinite;
      }

      .anim-pulse-dot {
        transform-origin: 295px 126px;
        animation: pulse-dot 1.5s ease-in-out infinite;
      }

      .anim-code {
        animation: code-scroll 12s infinite alternate ease-in-out;
      }

      .anim-glow {
        animation: glitch-glow 4s ease-in-out infinite;
      }

      /* Styles for vectors */
      .bg-rect { fill: #070707; stroke: var(--color-border); stroke-width: 1.5; }
      .grid-lines { fill: none; stroke: var(--color-grid); stroke-width: 0.75; }
      .accent-line { stroke: var(--color-border); stroke-width: 1; }
      .hud-line { stroke: var(--color-text-muted); stroke-width: 0.5; stroke-dasharray: 4, 4; }
      .tech-circle { fill: none; stroke: var(--color-text-muted); stroke-width: 0.75; }
      .tech-circle-active { fill: none; stroke: var(--color-text-primary); stroke-width: 1.25; }
      
      /* Typography Classes */
      .txt-title { font-weight: 700; font-size: 32px; fill: var(--color-text-primary); letter-spacing: 5px; }
      .txt-subtitle { font-weight: 400; font-size: 11px; fill: var(--color-text-secondary); letter-spacing: 2px; }
      .txt-label { font-weight: 500; font-size: 9px; fill: var(--color-text-muted); letter-spacing: 1px; }
      .txt-console { font-weight: 400; font-size: 10px; fill: var(--color-text-secondary); }
      .txt-console-muted { font-weight: 400; font-size: 10px; fill: var(--color-text-muted); }
      .txt-console-green { font-weight: 500; font-size: 10px; fill: #A0A0A0; }
    </style>
    
    <!-- Patterns -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#101010" stroke-width="0.75"/>
    </pattern>
    
    <!-- Scanline Gradient -->
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFF" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#FFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Main Background Panel -->
  <rect width="848" height="318" x="1" y="1" rx="8" class="bg-rect" />
  
  <!-- Cyber Grid -->
  <rect width="846" height="316" x="2" y="2" fill="url(#grid)" rx="8" />

  <!-- Animated Scanline Overlay -->
  <rect width="846" height="150" x="2" y="2" fill="url(#scan-grad)" class="anim-scanline" pointer-events="none" />

  <!-- Terminal Title Bar -->
  <g transform="translate(10, 10)">
    <!-- Buttons -->
    <circle cx="15" cy="15" r="5" fill="#222" stroke="#444" stroke-width="0.5" />
    <circle cx="30" cy="15" r="5" fill="#222" stroke="#444" stroke-width="0.5" />
    <circle cx="45" cy="15" r="5" fill="#222" stroke="#444" stroke-width="0.5" />
    
    <!-- Label -->
    <text x="70" y="19" class="font-mono txt-label" opacity="0.8">OBSERVATORY_TERMINAL_V1.0.9_SYS_ONLINE</text>
    <line x1="0" y1="30" x2="830" y2="30" stroke="#1A1A1A" stroke-width="1" />
  </g>

  <!-- Left Column: Branding, Status, Coordinates -->
  <g transform="translate(40, 75)">
    <!-- Tech ticks/decorations -->
    <line x1="-10" y1="0" x2="-10" y2="50" stroke="#FFF" stroke-width="2" />
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#FFF" stroke-width="2" />
    
    <!-- Large Name Title -->
    <text x="10" y="28" class="font-mono txt-title anim-glow">NAMAN MITTAL</text>
    <text x="10" y="47" class="font-mono txt-subtitle">// CREATIVE TECHNOLOGIST &amp; INTERACTIVE DEV</text>
    
    <!-- Divider -->
    <line x1="-10" y1="65" x2="350" y2="65" class="accent-line" />
    
    <!-- Systems Telemetry Details -->
    <g transform="translate(0, 85)">
      <!-- Line 1: Experience & Location -->
      <text x="0" y="15" class="font-mono txt-console-muted">EXPERIENCE :</text>
      <text x="90" y="15" class="font-mono txt-console">3+ YEARS ACTIVE</text>
      
      <text x="0" y="32" class="font-mono txt-console-muted">LOCATION   :</text>
      <text x="90" y="32" class="font-mono txt-console">DELHI, INDIA</text>
      
      <text x="0" y="49" class="font-mono txt-console-muted">LAT/LONG   :</text>
      <text x="90" y="49" class="font-mono txt-console">28.7041° N, 77.1025° E</text>

      <!-- Status dot -->
      <text x="0" y="68" class="font-mono txt-console-muted">SYS STATUS :</text>
      <text x="90" y="68" class="font-mono txt-console-green">OPERATIONAL</text>
      <circle cx="205" cy="64" r="4" fill="#FFFFFF" class="anim-pulse-dot" />
    </g>
    
    <!-- Sub-console border panel -->
    <rect x="-10" y="170" width="370" height="48" fill="#0E0E0E" stroke="#1C1C1C" rx="4" />
    <g transform="translate(0, 182)">
      <text x="10" y="10" class="font-mono txt-console" font-size="9" fill="#888">&gt; ssh coolguynova@obs.io -p 5173</text>
      <text x="10" y="24" class="font-mono txt-console" font-size="9" fill="#FFF">CONNECTION ESTABLISHED. SECURITY TUNNEL: PASS</text>
      <rect x="302" y="15" width="6" height="10" fill="#FFF" class="anim-blink" />
    </g>
  </g>

  <!-- Middle Divider Line -->
  <line x1="430" y1="55" x2="430" y2="285" stroke="#1A1A1A" stroke-width="1.5" stroke-dasharray="8, 4" />

  <!-- Right Column: Interactive Code Visualizer / Log Monitor -->
  <g transform="translate(450, 75)">
    <!-- Tech Window Header -->
    <rect x="0" y="0" width="160" height="218" fill="none" stroke="#1F1F1F" rx="4" />
    <path d="M 0 20 L 160 20" stroke="#1F1F1F" stroke-width="1" />
    <text x="10" y="13" class="font-mono txt-label" font-size="8">PROCESS_MONITOR</text>
    
    <!-- Code scroll block -->
    <g transform="translate(10, 35)" clip-path="url(#console-clip)">
      <clipPath id="console-clip">
        <rect x="0" y="0" width="140" height="165" />
      </clipPath>
      
      <g class="anim-code">
        <text x="0" y="12" class="font-mono txt-console" font-size="8" fill="#555">[00:01] INITIALIZE CORE</text>
        <text x="0" y="28" class="font-mono txt-console" font-size="8" fill="#888">[00:02] Loading siteConfig...</text>
        <text x="0" y="44" class="font-mono txt-console" font-size="8" fill="#FFF">[00:03] PORT 5173 ACTIVE</text>
        <text x="0" y="60" class="font-mono txt-console" font-size="8" fill="#888">[00:04] Lenis scroll OK</text>
        <text x="0" y="76" class="font-mono txt-console" font-size="8" fill="#888">[00:05] GSAP timelines clear</text>
        <text x="0" y="92" class="font-mono txt-console" font-size="8" fill="#FFF">[00:06] Vault re-indexed</text>
        <text x="0" y="108" class="font-mono txt-console" font-size="8" fill="#555">[00:07] 5 Hackathons cached</text>
        <text x="0" y="124" class="font-mono txt-console" font-size="8" fill="#888">[00:08] React 19 fibers: OK</text>
        <text x="0" y="140" class="font-mono txt-console" font-size="8" fill="#FFF">[00:09] Render: Monochrome</text>
        <text x="0" y="156" class="font-mono txt-console" font-size="8" fill="#888">[00:10] Loop complete. Respawn</text>
        <text x="0" y="172" class="font-mono txt-console" font-size="8" fill="#555">[00:11] Re-fetching status</text>
        <text x="0" y="188" class="font-mono txt-console" font-size="8" fill="#FFF">[00:12] Systems stable.</text>
      </g>
    </g>
  </g>

  <!-- Far Right Column: High-Tech Cybernetic Dial Graphic -->
  <!-- We set coordinate relative coordinates. anim-spin-cw expects transform-origin at 700 160 -->
  <g class="anim-pulse-slow">
    <!-- Outer concentric ticks -->
    <circle cx="700" cy="160" r="70" class="tech-circle" stroke-dasharray="3, 7" />
    <circle cx="700" cy="160" r="60" class="tech-circle" />
    <!-- Pulse target lines -->
    <line x1="620" y1="160" x2="780" y2="160" class="hud-line" />
    <line x1="700" y1="80" x2="700" y2="240" class="hud-line" />
  </g>
  
  <!-- Spinning elements -->
  <g class="anim-spin-cw">
    <!-- Dynamic segmented ring -->
    <circle cx="700" cy="160" r="50" class="tech-circle-active" stroke-dasharray="100, 40, 20, 40" />
    <!-- Ticks -->
    <line x1="690" y1="110" x2="710" y2="110" stroke="#FFF" stroke-width="1.5" />
    <line x1="690" y1="210" x2="710" y2="210" stroke="#FFF" stroke-width="1.5" />
  </g>
  
  <g class="anim-spin-ccw">
    <!-- Inner segmented ring -->
    <circle cx="700" cy="160" r="38" class="tech-circle" stroke-dasharray="40, 20, 60, 10" />
    <!-- Hexagon node cluster -->
    <polygon points="695,151 705,151 710,160 705,169 695,169 690,160" fill="none" stroke="#FFF" stroke-width="0.75" />
  </g>
  
  <!-- Tiny HUD markings in corners -->
  <g transform="translate(620, 255)" opacity="0.6">
    <text x="0" y="0" class="font-mono txt-label" font-size="7">DEVICES: ATTACHED</text>
    <text x="0" y="10" class="font-mono txt-label" font-size="7">GRID CALIBRATION: OK</text>
    <rect x="110" y="-8" width="12" height="4" fill="#FFF" />
    <rect x="125" y="-8" width="12" height="4" fill="#444" />
  </g>

</svg>
